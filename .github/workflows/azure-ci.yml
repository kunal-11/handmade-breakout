name: build deploy

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: build and deploy
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: install zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: build
        run: zig build web -Doptimize=ReleaseSmall --verbose

      - name: deploy azure static app
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GRAY_DUNE_035375D10 }}
          action: "upload"
          app_location: "zig-out/web"
          output_location: "zig-out/web"
          skip_app_build: true
          skip_api_build: true
